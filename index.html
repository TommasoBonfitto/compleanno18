<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>18.exe</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0a0a0a;
color:white;
overflow:hidden;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:2;
}

h1{
font-size:60px;
letter-spacing:4px;
margin-bottom:10px;
}

.subtitle{
opacity:0.7;
margin-bottom:30px;
}

.info{
font-size:20px;
margin:15px 0;
}

.button{
display:inline-block;
padding:15px 35px;
font-size:18px;
background:#00e5ff;
color:black;
text-decoration:none;
border-radius:12px;
margin-top:25px;
transition:0.25s;
}

.button:hover{
transform:scale(1.08);
background:white;
}

.countdown{
margin-top:25px;
font-size:22px;
opacity:0.8;
}

/* visualizer */

.visualizer{
position:absolute;
bottom:0;
width:100%;
height:200px;
display:flex;
align-items:flex-end;
justify-content:center;
gap:6px;
z-index:1;
}

.bar{
width:8px;
background:#00e5ff;
border-radius:5px 5px 0 0;
animation:beat 1s infinite ease-in-out;
}

@keyframes beat{
0%{height:20px}
50%{height:120px}
100%{height:20px}
}

</style>
</head>

<body>

<div class="container">

<h1>18.EXE</h1>

<div class="subtitle">
system upgrade: adult mode unlocked
</div>

<div class="info">
📅 23 Aprile <br>
⏰ 20:00 <br>
📍 (metti qui il luogo)
</div>

<a class="button" href="https://forms.gle/AireqN8G1FPncScP6" target="_blank">
CONFERMA PRESENZA
</a>

<div class="countdown" id="countdown"></div>

</div>

<div class="visualizer" id="visualizer"></div>

<script>

/* countdown */

var festa = new Date("Apr 23, 2026 20:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();
var distanza = festa - now;

var giorni = Math.floor(distanza/(1000*60*60*24));
var ore = Math.floor((distanza%(1000*60*60*24))/(1000*60*60));
var minuti = Math.floor((distanza%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML =
giorni + "g " + ore + "h " + minuti + "m";

},1000);


/* music visualizer */

const visualizer = document.getElementById("visualizer");

for(let i=0;i<40;i++){

let bar=document.createElement("div");
bar.classList.add("bar");

let random=(Math.random()*1)+0.5;

bar.style.animationDuration=random+"s";

visualizer.appendChild(bar);

}

</script>

</body>
</html>
