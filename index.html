<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>18</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  background:black;
}

/* BACKGROUND */
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0.4)),
    url("https://i.pinimg.com/736x/5b/a9/bd/5ba9bd194579fcc484fac743275323cc.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  z-index:-1;
}
@media (min-width:901px){
  .bg{
    background-size:contain;
    background-position:center;
  }
}

/* HERO */
.hero{
  height:65vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}
.hero h1{
  font-size:80px;
  margin:0;
  letter-spacing:8px;
}
.hero p{
  font-size:22px;
  opacity:0.8;
}

/* SECTION */
.section{
  max-width:420px;
  margin:auto;
  padding:30px 20px;
  text-align:center;
}
.info{
  font-size:20px;
  line-height:1.8;
}

/* BUTTON */
.button{
  display:block;
  margin-top:35px;
  padding:20px;
  font-size:20px;
  font-weight:bold;
  background:linear-gradient(90deg,#7b00ff,#00eaff);
  border-radius:14px;
  text-decoration:none;
  color:white;
}

/* COUNTDOWN */
.countdown{
  margin-top:25px;
  font-size:18px;
  opacity:0.85;
}

/* VISUALIZER */
.visualizer{
  margin-top:35px;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:5px;
  height:100px;
}
.bar{
  width:6px;
  background:#8c00ff;
  animation:beat infinite ease-in-out;
  border-radius:3px;
}
@keyframes beat{
  0%{height:15px}
  50%{height:90px}
  100%{height:15px}
}
</style>
</head>
<body>

<!-- SFONDO -->
<div class="bg"></div>

<!-- HERO -->
<div class="hero">
  <h1>18</h1>
  <p>23 APR 2026</p>
</div>

<!-- SEZIONE -->
<div class="section">
  <div class="info">
    📅 23 Aprile<br>
    📍 scrivimi per la location ed orario
  </div>

  <a class="button" href="https://forms.gle/AireqN8G1FPncScP6" target="_blank">
    CONFERMA PRESENZA
  </a>

  <div class="countdown" id="countdown"></div>
  <div class="visualizer" id="visualizer"></div>
</div>

<!-- AUTOPLAY AUDIO YOUTUBE INVISIBILE -->
<iframe width="0" height="0" 
src="https://www.youtube.com/embed/8jLLFEvNWZg?autoplay=1&loop=1&playlist=8jLLFEvNWZg" 
frameborder="0" allow="autoplay" allowfullscreen></iframe>

<script>
/* countdown */
var festa = new Date("Apr 23, 2026 20:00:00").getTime();
setInterval(function(){
  var now = new Date().getTime();
  var distanza = festa - now;
  var giorni = Math.floor(distanza/(1000*60*60*24));
  var ore = Math.floor((distanza%(1000*60*60*24))/(1000*60*60));
  var minuti = Math.floor((distanza%(1000*60*60))/(1000*60));
  document.getElementById("countdown").innerHTML =
    giorni+"g "+ore+"h "+minuti+"m";
},1000);

/* visualizer */
const visualizer=document.getElementById("visualizer");
for(let i=0;i<30;i++){
  let bar=document.createElement("div");
  bar.classList.add("bar");
  bar.style.animationDuration=(Math.random()*1+0.5)+"s";
  visualizer.appendChild(bar);
}
</script>

</body>
</html>
