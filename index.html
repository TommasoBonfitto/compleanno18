<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>18.EXE</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0b;
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
text-align:center;
}

.container{
width:90%;
max-width:500px;
}

h1{
font-size:48px;
letter-spacing:4px;
margin-bottom:5px;
}

.subtitle{
opacity:0.6;
font-size:14px;
margin-bottom:30px;
}

.info{
font-size:20px;
line-height:1.6;
margin-bottom:25px;
}

.button{
display:block;
width:100%;
padding:18px;
font-size:18px;
background:#00f0ff;
color:black;
border-radius:12px;
text-decoration:none;
font-weight:bold;
margin-top:20px;
transition:0.25s;
}

.button:hover{
transform:scale(1.05);
background:white;
}

.countdown{
margin-top:25px;
font-size:18px;
opacity:0.8;
}

/* visualizer */

.visualizer{
margin-top:40px;
display:flex;
justify-content:center;
align-items:flex-end;
gap:5px;
height:120px;
}

.bar{
width:6px;
background:#00f0ff;
border-radius:3px;
animation:beat infinite ease-in-out;
}

@keyframes beat{

0%{height:10px}
50%{height:100px}
100%{height:10px}

}

</style>
</head>

<body>

<div class="container">

<h1>18.EXE</h1>

<div class="subtitle">
system upgrade: adult mode unlocked
</div>

<div class="info">
📅 23 Aprile<br>
⏰ 20:00<br>
📍 scrivimi per la location
</div>

<a class="button" href="https://forms.gle/AireqN8G1FPncScP6" target="_blank">
CONFERMA PRESENZA
</a>

<div class="countdown" id="countdown"></div>

<div class="visualizer" id="visualizer"></div>

</div>

<script>

/* countdown */

var festa = new Date("Apr 23, 2026 20:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();
var distanza = festa - now;

var giorni = Math.floor(distanza/(1000*60*60*24));
var ore = Math.floor((distanza%(1000*60*60*24))/(1000*60*60));
var minuti = Math.floor((distanza%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML =
"⏳ " + giorni + "g " + ore + "h " + minuti + "m";

},1000);


/* music visualizer */

const visualizer = document.getElementById("visualizer");

for(let i=0;i<30;i++){

let bar=document.createElement("div");
bar.classList.add("bar");

let random=(Math.random()*1.2)+0.5;

bar.style.animationDuration=random+"s";

visualizer.appendChild(bar);

}

</script>

</body>
