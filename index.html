<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Il mio 18° 🎉</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:rgba(0,0,0,0.4);
padding:40px;
border-radius:15px;
}

h1{
font-size:42px;
}

.info{
font-size:20px;
margin:20px 0;
}

.button{
display:inline-block;
padding:15px 30px;
font-size:20px;
background:#00d4ff;
color:black;
text-decoration:none;
border-radius:10px;
margin-top:20px;
transition:0.3s;
}

.button:hover{
background:white;
transform:scale(1.05);
}

.countdown{
font-size:24px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Il mio 18° 🎉</h1>

<div class="info">
📅 23 Aprile <br>
⏰ ore 20:00 <br>
📍 (metti qui il luogo)
</div>

<p>
Finalmente divento maggiorenne 🥳<br>
Vieni a festeggiare con me!
</p>

<a class="button" href="https://forms.gle/AireqN8G1FPncScP6" target="_blank">
✅ Conferma presenza
</a>

<div class="countdown" id="countdown"></div>

</div>

<script>

var festa = new Date("Apr 23, 2026 20:00:00").getTime();

var x = setInterval(function(){

var now = new Date().getTime();
var distanza = festa - now;

var giorni = Math.floor(distanza / (1000*60*60*24));
var ore = Math.floor((distanza % (1000*60*60*24)) / (1000*60*60));
var minuti = Math.floor((distanza % (1000*60*60)) / (1000*60));

document.getElementById("countdown").innerHTML =
"⏳ Mancano " + giorni + "g " + ore + "h " + minuti + "m";

},1000);

</script>

</body>
</html>
